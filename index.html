<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZBot - Advanced OpenRouter Chatbot</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.400.0/lucide.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .message-user { background-color: #2563eb; color: white; border-bottom-right-radius: 0; }
        .message-bot { background-color: white; border: 1px solid #e5e7eb; color: #1f2937; border-bottom-left-radius: 0; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const OPENROUTER_AUTH_URL = 'https://openrouter.ai/auth';
        const OPENROUTER_API_URL = 'https://openrouter.ai/api/v1';

        // Icons placeholder (simple SVG versions of Lucide icons)
        const BotIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        );
        const SendIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        );
        const UserIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        );
        const SettingsIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        );

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('openrouter_api_key'));
            const [models, setModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('google/gemini-2.0-flash-001');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                // Handle OAuth callback
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const codeVerifier = localStorage.getItem('code_verifier');

                if (code && codeVerifier) {
                    exchangeCodeForKey(code, codeVerifier);
                }

                if (apiKey) {
                    fetchModels();
                }
            }, [apiKey]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            async function exchangeCodeForKey(code, codeVerifier) {
                try {
                    const response = await fetch(`${OPENROUTER_API_URL}/auth/keys`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            code,
                            code_verifier: codeVerifier,
                            code_challenge_method: 'S256',
                        }),
                    });
                    const data = await response.json();
                    if (data.key) {
                        localStorage.setItem('openrouter_api_key', data.key);
                        localStorage.removeItem('code_verifier');
                        setApiKey(data.key);
                        // Clean URL
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } catch (err) {
                    console.error('OAuth exchange failed', err);
                }
            }

            async function fetchModels() {
                try {
                    const response = await fetch(`${OPENROUTER_API_URL}/models`);
                    const { data } = await response.json();
                    setModels(data.sort((a, b) => a.name.localeCompare(b.name)));
                } catch (err) {
                    console.error('Failed to fetch models', err);
                }
            }

            async function handleLogin() {
                const array = new Uint8Array(32);
                window.crypto.getRandomValues(array);
                const codeVerifier = btoa(String.fromCharCode.apply(null, Array.from(array)))
                    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

                localStorage.setItem('code_verifier', codeVerifier);

                const encoder = new TextEncoder();
                const data = encoder.encode(codeVerifier);
                const hashBuffer = await window.crypto.subtle.digest('SHA-256', data);
                const codeChallenge = btoa(String.fromCharCode.apply(null, Array.from(new Uint8Array(hashBuffer))))
                    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

                const callbackUrl = window.location.origin + window.location.pathname;
                const authUrl = `${OPENROUTER_AUTH_URL}?callback_url=${encodeURIComponent(callbackUrl)}&code_challenge=${codeChallenge}&code_challenge_method=S256`;
                window.location.href = authUrl;
            }

            async function handleSubmit(e) {
                e.preventDefault();
                if (!input.trim() || !apiKey || isLoading) return;

                const userMsg = { role: 'user', content: input };
                const newMessages = [...messages, userMsg];
                setMessages(newMessages);
                setInput('');
                setIsLoading(true);

                try {
                    const assistantMsg = { role: 'assistant', content: '' };
                    setMessages([...newMessages, assistantMsg]);

                    const response = await fetch(`${OPENROUTER_API_URL}/chat/completions`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            model: selectedModel,
                            messages: newMessages,
                            stream: true,
                        }),
                    });

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();

                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed || !trimmed.startsWith('data: ')) continue;
                            const data = trimmed.slice(6);
                            if (data === '[DONE]') break;

                            try {
                                const parsed = JSON.parse(data);
                                const content = parsed.choices[0]?.delta?.content || '';
                                if (content) {
                                    setMessages(prev => {
                                        const last = prev[prev.length - 1];
                                        return [...prev.slice(0, -1), { ...last, content: last.content + content }];
                                    });
                                }
                            } catch (e) {}
                        }
                    }
                } catch (err) {
                    console.error(err);
                } finally {
                    setIsLoading(false);
                }
            }

            if (!apiKey) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-4">
                        <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center border border-gray-100">
                            <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <BotIcon />
                            </div>
                            <h1 className="text-3xl font-bold text-gray-900 mb-2">ZBot</h1>
                            <p className="text-gray-500 mb-8 leading-relaxed text-sm">
                                Connect your OpenRouter account to start chatting with hundreds of AI models.
                                Supports BYOK for full control over your keys and costs.
                            </p>
                            <button onClick={handleLogin} className="w-full py-4 px-6 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/20">
                                Sign in with OpenRouter
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-80 bg-white border-r border-gray-200 flex flex-col hidden md:flex shadow-sm">
                        <div className="p-6 border-b border-gray-100 flex items-center gap-3">
                            <div className="text-blue-600"><BotIcon /></div>
                            <span className="font-bold text-xl tracking-tight text-gray-800">ZBot</span>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-8">
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase mb-3">Model Selection</label>
                                <select
                                    value={selectedModel}
                                    onChange={(e) => setSelectedModel(e.target.value)}
                                    className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none"
                                >
                                    {models.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase mb-3">BYOK Settings</label>
                                <a href="https://openrouter.ai/settings/byok" target="_blank" class="flex items-center gap-2 p-3 text-sm text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all border border-transparent hover:border-blue-100">
                                    <SettingsIcon />
                                    Manage Keys
                                </a>
                            </div>
                        </div>
                        <div className="p-6 border-t border-gray-100">
                            <button onClick={() => {localStorage.removeItem('openrouter_api_key'); setApiKey(null);}} className="w-full p-3 text-sm font-medium text-red-600 hover:bg-red-50 rounded-xl transition-all">Sign Out</button>
                        </div>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 flex flex-col min-w-0">
                        <div className="flex-1 overflow-y-auto p-4 md:p-10 space-y-8 bg-white md:bg-gray-50">
                            {messages.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-center opacity-40">
                                    <div className="w-20 h-20 bg-gray-100 rounded-3xl flex items-center justify-center mb-4">
                                        <BotIcon />
                                    </div>
                                    <h2 className="text-xl font-bold">How can I help you today?</h2>
                                </div>
                            ) : (
                                messages.map((m, i) => (
                                    <div key={i} className={`flex gap-4 max-w-4xl mx-auto ${m.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                        <div className={`w-10 h-10 rounded-2xl flex items-center justify-center flex-shrink-0 shadow-sm ${m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-white text-gray-500 border border-gray-100'}`}>
                                            {m.role === 'user' ? <UserIcon /> : <BotIcon />}
                                        </div>
                                        <div className={`px-5 py-4 rounded-3xl text-sm leading-relaxed shadow-sm ${m.role === 'user' ? 'message-user' : 'message-bot'}`}>
                                            {m.content || '...'}
                                        </div>
                                    </div>
                                ))
                            )}
                            <div ref={messagesEndRef} />
                        </div>

                        <div className="p-4 md:p-10 bg-white md:bg-transparent border-t md:border-none border-gray-100">
                            <form onSubmit={handleSubmit} className="max-w-4xl mx-auto relative group">
                                <div className="absolute -inset-1 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-3xl blur opacity-10 group-focus-within:opacity-20 transition duration-1000"></div>
                                <div className="relative flex items-center bg-white border border-gray-200 rounded-3xl shadow-xl overflow-hidden px-4">
                                    <textarea
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyDown={(e) => {if (e.key === 'Enter' && !e.shiftKey) {e.preventDefault(); handleSubmit(e);}}}
                                        placeholder="Type a message..."
                                        rows="1"
                                        className="w-full py-5 px-2 bg-transparent border-none focus:ring-0 text-gray-800 placeholder-gray-400 text-base resize-none"
                                    />
                                    <button disabled={isLoading || !input.trim()} className="ml-2 bg-blue-600 text-white p-3 rounded-2xl hover:bg-blue-700 disabled:bg-gray-100 disabled:text-gray-300 transition-all">
                                        <SendIcon />
                                    </button>
                                </div>
                            </form>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
