<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZBot - Production Grade AI Chatbot</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    </style>
</head>
<body class="bg-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const OPENROUTER_AUTH_URL = 'https://openrouter.ai/auth';
        const OPENROUTER_API_URL = 'https://openrouter.ai/api/v1';

        // Minimal SVG Icons
        const SparklesIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
        );
        const SendIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        );
        const UserIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        );

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('openrouter_api_key'));
            const [models, setModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('google/gemini-2.0-flash-001');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const codeVerifier = localStorage.getItem('code_verifier');

                if (code && codeVerifier) {
                    exchangeCodeForKey(code, codeVerifier);
                }
                if (apiKey) fetchModels();
            }, [apiKey]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            async function exchangeCodeForKey(code, codeVerifier) {
                try {
                    const response = await fetch(`${OPENROUTER_API_URL}/auth/keys`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code, code_verifier: codeVerifier, code_challenge_method: 'S256' }),
                    });
                    const data = await response.json();
                    if (data.key) {
                        localStorage.setItem('openrouter_api_key', data.key);
                        localStorage.removeItem('code_verifier');
                        setApiKey(data.key);
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } catch (err) { console.error(err); }
            }

            async function fetchModels() {
                try {
                    const response = await fetch(`${OPENROUTER_API_URL}/models`);
                    const { data } = await response.json();
                    setModels(data.sort((a, b) => a.name.localeCompare(b.name)));
                } catch (err) { console.error(err); }
            }

            async function handleLogin() {
                const array = new Uint8Array(32);
                window.crypto.getRandomValues(array);
                const codeVerifier = btoa(String.fromCharCode.apply(null, Array.from(array)))
                    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
                localStorage.setItem('code_verifier', codeVerifier);

                const hashBuffer = await window.crypto.subtle.digest('SHA-256', new TextEncoder().encode(codeVerifier));
                const codeChallenge = btoa(String.fromCharCode.apply(null, Array.from(new Uint8Array(hashBuffer))))
                    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

                window.location.href = `${OPENROUTER_AUTH_URL}?callback_url=${encodeURIComponent(window.location.href)}&code_challenge=${codeChallenge}&code_challenge_method=S256`;
            }

            async function handleSubmit(e) {
                e.preventDefault();
                if (!input.trim() || !apiKey || isLoading) return;

                const userMsg = { role: 'user', content: input };
                const newMessages = [...messages, userMsg];
                setMessages(newMessages);
                setInput('');
                setIsLoading(true);

                try {
                    const assistantMsg = { role: 'assistant', content: '' };
                    setMessages([...newMessages, assistantMsg]);

                    const response = await fetch(`${OPENROUTER_API_URL}/chat/completions`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: selectedModel, messages: newMessages, stream: true }),
                    });

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();

                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed.startsWith('data: ')) continue;
                            const data = trimmed.slice(6);
                            if (data === '[DONE]') break;
                            try {
                                const parsed = JSON.parse(data);
                                const content = parsed.choices[0]?.delta?.content || '';
                                if (content) {
                                    setMessages(prev => {
                                        const last = prev[prev.length - 1];
                                        return [...prev.slice(0, -1), { ...last, content: last.content + content }];
                                    });
                                }
                            } catch (e) {}
                        }
                    }
                } catch (err) { console.error(err); } finally { setIsLoading(false); }
            }

            if (!apiKey) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-[#0a0a0a] text-white p-4">
                        <div className="max-w-md w-full bg-[#111] rounded-[2.5rem] p-12 text-center border border-white/5 shadow-2xl shadow-blue-500/10">
                            <div className="w-20 h-20 bg-blue-600 rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-xl shadow-blue-600/20">
                                <SparklesIcon />
                            </div>
                            <h1 className="text-4xl font-bold mb-4">ZBot</h1>
                            <p className="text-white/40 mb-10 text-sm leading-relaxed">The production-grade AI assistant, powered by OpenRouter.</p>
                            <button onClick={handleLogin} className="w-full py-4 px-6 bg-white text-black rounded-2xl font-bold hover:bg-white/90 transition-all">Sign in with OpenRouter</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen max-w-5xl mx-auto">
                    <header className="h-20 flex items-center justify-between px-6 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white"><SparklesIcon /></div>
                            <span className="font-bold text-xl">ZBot</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <select value={selectedModel} onChange={(e) => setSelectedModel(e.target.value)} className="bg-gray-100 border-none rounded-xl px-4 py-2 text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500/20">
                                {models.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                            </select>
                            <button onClick={() => {localStorage.removeItem('openrouter_api_key'); setApiKey(null);}} className="text-sm font-bold text-gray-400 hover:text-red-500 transition-colors">Sign Out</button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto custom-scrollbar px-6 py-10 space-y-10">
                        {messages.length === 0 ? (
                            <div className="h-full flex flex-col items-center justify-center text-center opacity-20">
                                <SparklesIcon />
                                <h2 className="text-4xl font-bold mt-4">How can I help you?</h2>
                            </div>
                        ) : (
                            messages.map((m, i) => (
                                <div key={i} className={`flex gap-6 max-w-3xl mx-auto ${m.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                    <div className={`w-10 h-10 rounded-2xl flex items-center justify-center flex-shrink-0 ${m.role === 'user' ? 'bg-gray-900 text-white' : 'bg-blue-600 text-white'}`}>
                                        {m.role === 'user' ? <UserIcon /> : <SparklesIcon />}
                                    </div>
                                    <div className={`px-6 py-4 rounded-3xl text-base leading-relaxed ${m.role === 'user' ? 'bg-gray-100 text-gray-800' : 'bg-white border border-gray-100 text-gray-800 shadow-sm'}`}>
                                        <div style={{ whiteSpace: 'pre-wrap' }}>{m.content || '...'}</div>
                                    </div>
                                </div>
                            ))
                        )}
                        <div ref={messagesEndRef} className="h-10" />
                    </main>

                    <footer className="p-6 shrink-0">
                        <form onSubmit={handleSubmit} className="max-w-3xl mx-auto relative group">
                            <div className="relative flex items-center bg-white border border-gray-200 rounded-[2rem] shadow-2xl shadow-gray-200/50 p-2 pr-3">
                                <textarea
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => {if (e.key === 'Enter' && !e.shiftKey) {e.preventDefault(); handleSubmit(e);}}}
                                    placeholder="Message ZBot..."
                                    rows="1"
                                    className="w-full py-4 px-4 bg-transparent border-none focus:ring-0 text-gray-800 text-base resize-none"
                                />
                                <button disabled={isLoading || !input.trim()} className="shrink-0 w-12 h-12 rounded-2xl flex items-center justify-center bg-blue-600 text-white hover:bg-blue-700 disabled:bg-gray-100 disabled:text-gray-300 transition-all shadow-lg">
                                    <SendIcon />
                                </button>
                            </div>
                        </form>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
